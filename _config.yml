title: "zzhining"
description: "지식과 경험을 나누는 공간"
url: "https://zzhining.github.io"
baseurl: ""
author: "zzhining"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  style: compressed

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation
navigation:
  - title: "About Me"
    url: "/about/"
  - title: "지식창고"
    url: "/theory/"
    submenu:
      - title: "생성형 AI"
        url: "/theory/generative-ai/"
      - title: "파이썬 기초"
        url: "/theory/python-basics/"
      - title: "데이터 분석"
        url: "/theory/data-analysis/"
      - title: "대시보드 생성"
        url: "/theory/dashboard/"
      - title: "머신러닝/딥러닝"
        url: "/theory/ml-dl/"
      - title: "데이터"
        url: "/theory/data/"
      - title: "소프트웨어엔지니어링"
        url: "/theory/software-engineering/"
  - title: "블로그"
    url: "/blog/"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "theory"
    values:
      layout: "theory"
  - scope:
      path: "about"
    values:
      layout: "page"
  - scope:
      path: "blog"
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .gitignore
