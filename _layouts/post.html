---
layout: default
---
<div class="post-wrapper">
  <div class="container">
    <article class="post">
      <header class="post-header">
        {% if page.category %}
        <div class="post-category">
          <a href="{{ '/blog/' | relative_url }}" class="category-badge">{{ page.category }}</a>
        </div>
        {% endif %}
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
          <span class="post-date">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>
            {{ page.date | date: "%Y년 %m월 %d일" }}
          </span>
          {% if page.tags %}
          <div class="post-tags">
            {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </header>

      <div class="post-body">
        {{ content }}
      </div>

      <footer class="post-footer">
        <a href="{{ '/blog/' | relative_url }}" class="btn btn-outline">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
          블로그 목록으로
        </a>
      </footer>
    </article>
  </div>
</div>
